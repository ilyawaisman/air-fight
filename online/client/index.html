<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Fight</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="settingsBackdrop" class="settings-backdrop"></div>
    <div class="mobile-top-bar">
      <div class="mobile-brand">Air Fight <span class="version">v1.4.1 online</span></div>
      <div class="mobile-status" id="mobileStatus">
        <span style="color: var(--red); font-weight: 800;" id="mobileRedStats"></span>
        <span style="color: var(--border); margin: 0 4px;">|</span>
        <span style="color: var(--blue); font-weight: 800;" id="mobileBlueStats"></span>
      </div>
    </div>

    <main class="app">
      <section class="control-panel" aria-label="Game controls">
        <button id="closeSettings" class="close-btn" type="button" aria-label="Close settings">&times;</button>
        <div class="brand">
          <h1>Air Fight <span class="version">v1.4.1 online</span></h1>
          <p>Quad-ruled paper dogfight</p>
        </div>

        <div class="controls">
          <div class="mode-option-group" role="radiogroup" aria-label="Play mode">
            <span class="group-title">Mode</span>
            <div class="radio-segmented mode-segmented">
              <label>
                <input type="radio" name="playMode" value="computer" checked>
                <span>Computer</span>
              </label>
              <label>
                <input type="radio" name="playMode" value="local">
                <span>Hot Seat</span>
              </label>
              <label>
                <input type="radio" name="playMode" value="network">
                <span>Network</span>
              </label>
            </div>
          </div>

          <div class="network-only network-preset-group">
            <span class="group-title">Online Preset</span>
            <label class="preset">
              <input type="radio" name="networkPreset" value="duel" checked>
              <span><strong>Duel</strong> 24x24, 1 plane, no turrets</span>
            </label>
            <label class="preset">
              <input type="radio" name="networkPreset" value="classic">
              <span><strong>Classic</strong> 24x48, 3 planes, 1 turret</span>
            </label>
            <label class="preset">
              <input type="radio" name="networkPreset" value="tactical">
              <span><strong>Tactical</strong> 28x56, 7 planes, 1 turret</span>
            </label>
          </div>

          <label class="local-only">
            Field
            <span class="field-pair">
              <input id="fieldWidth" type="number" min="12" max="80" value="24" aria-label="Field width">
              <span>x</span>
              <input id="fieldHeight" type="number" min="16" max="96" value="48" aria-label="Field height">
            </span>
            <span class="field-presets">
              <button type="button" class="preset-btn" data-w="12" data-h="16">12x16</button>
              <button type="button" class="preset-btn" data-w="24" data-h="24">24x24</button>
              <button type="button" class="preset-btn" data-w="24" data-h="48">24x48</button>
              <button type="button" class="preset-btn" data-w="80" data-h="96">80x96</button>
            </span>
          </label>

          <label class="local-only">
            Airplanes
            <select id="planeCount">
              <option value="1">1</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
            </select>
          </label>

          <label class="local-only">
            Turrets
            <select id="turretCount">
              <option value="0">0</option>
              <option value="1" selected>1</option>
              <option value="2">2</option>
            </select>
          </label>

          <label class="local-only">
            Obstacles
            <select id="obstacles">
              <option value="none">None</option>
              <option value="big">Big</option>
              <option value="small">Small</option>
              <option value="mixed" selected>Mixed</option>
            </select>
          </label>

          <label class="checkbox-label local-only">
            <input id="showTurretZones" type="checkbox" checked>
            <span>Show attack zones</span>
          </label>

          <label id="nameField" class="network-only">
            Name
            <input id="playerName" maxlength="24" value="Pilot" autocomplete="nickname">
          </label>

          <div class="map-option-group local-only" role="radiogroup" aria-label="Map preservation on restart">
            <span class="group-title">Restart map</span>
            <div class="radio-segmented">
              <label>
                <input type="radio" name="mapOption" value="new" checked>
                <span>New</span>
              </label>
              <label>
                <input type="radio" name="mapOption" value="keep">
                <span>Keep</span>
              </label>
              <label>
                <input type="radio" name="mapOption" value="swap">
                <span>Swap</span>
              </label>
            </div>
          </div>

          <div class="buttons">
            <button id="newGame" class="new-game-btn" type="button">New</button>
            <div class="replay-group">
              <button class="replay-btn" type="button" disabled>Replay</button>
              <button class="speed-btn" type="button" aria-label="Replay speed">1x</button>
            </div>
            <button id="leaveQueue" class="secondary network-only" type="button" disabled>Leave</button>
          </div>
        </div>
      </section>

      <section class="board-wrap" aria-label="Air Fight board">
        <div class="board-container" id="boardContainer">
          <canvas id="board" width="1000" height="1600" tabindex="0"></canvas>
          <div id="endGameOverlay" class="end-game-overlay">
            <div class="overlay-content">
              <h2 id="overlayTitle"></h2>
              <p id="overlaySubtitle">Game Over</p>
            </div>
          </div>
          <div id="endGameBanner" class="end-game-banner">
            <span id="bannerText"></span>
          </div>
        </div>

        <aside class="status-panel">
          <div>
            <span class="eyebrow">Mode</span>
            <strong id="modeLabel">Computer</strong>
          </div>
          <div>
            <span class="eyebrow">Turn</span>
            <strong id="turnLabel">Red</strong>
          </div>
          <div>
            <span class="eyebrow">Moving</span>
            <strong id="moveLabel">Plane</strong>
          </div>
          <div>
            <span class="eyebrow">Velocity</span>
            <strong id="velocityLabel">(0, 0)</strong>
          </div>
          <div>
            <span class="eyebrow">Red alive</span>
            <strong id="redAlive">0</strong>
          </div>
          <div>
            <span class="eyebrow">Blue alive</span>
            <strong id="blueAlive">0</strong>
          </div>
          <p id="message" class="message">Choose one highlighted point.</p>
        </aside>

        <div class="mobile-action-bar">
          <div class="new-game-group">
            <button class="new-game-btn" type="button">New</button>
            <button id="toggleSettings" class="settings-toggle-btn-mobile" type="button" aria-label="Configure Settings">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15"></polyline>
              </svg>
            </button>
          </div>
          <div class="radio-segmented compact local-only" role="radiogroup" aria-label="Map preservation on restart mobile">
            <label>
              <input type="radio" name="mapOptionMobile" value="new" checked>
              <span>New Map</span>
            </label>
            <label>
              <input type="radio" name="mapOptionMobile" value="keep">
              <span>Keep Map</span>
            </label>
            <label>
              <input type="radio" name="mapOptionMobile" value="swap">
              <span>Swap Map</span>
            </label>
          </div>
          <div class="replay-group">
            <button class="replay-btn" type="button" disabled>Replay</button>
            <button class="speed-btn" type="button" aria-label="Replay speed">1x</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
